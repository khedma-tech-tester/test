<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات المصنع | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: #f0f4f8; color: #1e293b; }
        .factory-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; overflow: hidden; }
        .factory-input { background: #f8fafc; border: 2px solid #e2e8f0; padding: 1rem; border-radius: 1rem; width: 100%; outline: none; font-weight: 700; }
        .factory-input:focus { border-color: #059669; background: white; }
        .status-step { position: relative; padding-bottom: 2rem; border-right: 2px solid #e2e8f0; padding-right: 2rem; margin-right: 1rem; }
        .status-step::before { content: ''; position: absolute; right: -9px; top: 0; width: 16px; height: 16px; border-radius: 50%; background: #e2e8f0; border: 4px solid #fff; }
        .status-active::before { background: #059669; box-shadow: 0 0 10px rgba(5, 150, 105, 0.5); }
        .status-active { border-right-color: #059669; }
    </style>
</head>
<body class="pb-20">
    <nav class="bg-slate-900 text-white p-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-900/20">
                    <i class="fas fa-industry"></i>
                </div>
                <div>
                    <h1 class="text-xl font-900 leading-none">توريدات المصنع</h1>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mt-1">Direct Factory Access</p>
                </div>
            </div>
            <button onclick="history.back()" class="bg-slate-800 px-6 py-2 rounded-xl font-bold text-sm">رجوع</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2 space-y-8">
            <section class="factory-card p-10">
                <h2 class="text-2xl font-900 mb-8 flex items-center gap-3">
                    <i class="fas fa-clipboard-list text-emerald-600"></i>
                    طلب توريد مواد خام / جملة
                </h2>
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-black text-slate-500 mb-2">الصنف المطلوب</label>
                        <select id="factory-item" class="factory-input">
                            <option value="raw-soap">صابون خام (براميل)</option>
                            <option value="clor-bulk">كلور مركز (جملة)</option>
                            <option value="tools-kit">شنطة عِدة فنية متكاملة</option>
                            <option value="spare-parts">قطع غيار سباكة/كهرباء</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-black text-slate-500 mb-2">الكمية / العدد</label>
                        <input type="number" id="factory-qty" class="factory-input" placeholder="مثلاً: 5">
                    </div>
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-black text-slate-500 mb-2">ملاحظات التوريد</label>
                    <textarea id="factory-note" rows="3" class="factory-input" placeholder="اكتب أي مواصفات خاصة للمصنع..."></textarea>
                </div>
                <button onclick="sendFactoryOrder()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded
