<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة المباشرة | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #020617; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 15px; border-radius: 1.5rem; margin-bottom: 15px; position: relative; font-weight: 700; }
        .msg-sent { background: #2563eb; color: white; align-self: flex-end; border-bottom-left-radius: 0.2rem; margin-right: auto; }
        .msg-received { background: #1e293b; color: #f8fafc; align-self: flex-start; border-bottom-right-radius: 0.2rem; }
        .chat-input { background: #0f172a; border-top: 1px solid #1e293b; padding: 20px; }
    </style>
</head>
<body>
    <header class="bg-[#0f172a] p-4 flex items-center justify-between border-b border-slate-800">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-slate-400 p-2"><i class="fas fa-chevron-right text-xl"></i></button>
            <div class="relative">
                <img src="https://ui-avatars.com/api/?name=Technician&background=2563eb&color=fff" class="w-10 h-10 rounded-full">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#0f172a] rounded-full"></div>
            </div>
            <div>
                <h2 class="text-sm font-900 text-white">الفني: أحمد السباك</h2>
                <p class="text-[10px] text-green-500 font-bold">متصل الآن</p>
            </div>
        </div>
        <div class="flex gap-4 text-slate-400">
            <a href="tel:0100000000"><i class="fas fa-phone"></i></a>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <main class="chat-container flex flex-col" id="chat-box">
        <div class="msg msg-received">
            السلام عليكم يا فندم، معاك فني خِدمة تك. ممكن تبعتلي صورة للعطل؟
        </div>
        
        <div class="msg msg-sent">
            وعليكم السلام، دي صورة حنفية المطبخ بتسرب مياه كتير.
        </div>

        <div class="msg msg-sent">
            <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=300" class="rounded-xl mt-2">
        </div>

        <div class="msg msg-received">
            تمام، دي محتاجة قلب جديد. تكلفتها هتكون حوالي 80 جنيه شاملة التركيب. تحب أتحرك دلوقتي؟
        </div>
    </main>

    <footer class="chat-input">
        <div class="flex items-center gap-3">
            <button class="w-12 h-12 bg-slate-800 rounded-2xl text-slate-400"><i class="fas fa-paperclip"></i></button>
            <div class="flex-1 relative">
                <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا..." class="w-full bg-slate-800 border-none rounded-2xl py-4 px-6 text-white outline-none focus:ring-2 ring-blue-600 font-bold">
            </div>
            <button onclick="sendMessage()" class="w-12 h-12 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-900/40">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const chatBox = document.getElementById('chat-box');
            
            if(input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = "msg msg-sent";
                div.innerText = input.value;
                chatBox.appendChild(div);
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // تمكين الضغط على Enter للإرسال
        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
