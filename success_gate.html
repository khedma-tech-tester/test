<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النجاح | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #020617; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .success-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 3.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .check-icon {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3);
            transform: rotate(-10deg);
            animation: popCheck 0.8s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
        @keyframes popCheck { 0% { transform: scale(0) rotate(0deg); } 100% { transform: scale(1) rotate(-10deg); } }
        
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 10px; margin-top: 2.5rem; overflow: hidden;
        }
        .progress-fill {
            width: 0%; height: 100%; background: #2563eb;
            animation: fillProgress 2.5s linear forwards;
        }
        @keyframes fillProgress { to { width: 100%; } }
    </style>
</head>
<body>

    <div class="success-card max-w-sm w-[90%]">
        <div class="check-icon">
            <i class="fas fa-check text-4xl text-white"></i>
        </div>

        <h1 id="main-msg" class="text-3xl font-900 mb-3 tracking-tight">تم الدخول بنجاح!</h1>
        <p id="sub-msg" class="text-slate-400 font-bold px-4">مرحباً بك في عالم خِدمة تك، جاري تحضير واجهتك الخاصة...</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <p class="text-[10px] text-blue-500 font-black mt-4 uppercase tracking-[0.2em] animate-pulse">Redirecting to Dashboard</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        
        if(type === 'new') {
            document.getElementById('main-msg').innerText = "أهلاً بك معنا!";
            document.getElementById('sub-msg').innerText = "تم إنشاء حسابك بنجاح. المنصورة الآن بين يديك.";
        }

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2500);
    </script>
</body>
</html>
