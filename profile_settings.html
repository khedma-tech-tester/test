<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; transition: all 0.3s ease; }
        body { background: #020617; color: white; }
        .profile-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 3rem; }
        .input-group input { background: #1e293b; border: 1px solid #334155; color: white; padding: 1rem; border-radius: 1.25rem; width: 100%; outline: none; }
        .input-group input:focus { border-color: #2563eb; }
        .upload-area { border: 2px dashed #334155; border-radius: 2rem; padding: 40px; text-align: center; cursor: pointer; }
        .upload-area:hover { border-color: #2563eb; background: #1e293b; }
    </style>
</head>
<body class="p-6 md:p-12">
    <main class="max-w-3xl mx-auto profile-card p-10 md:p-16">
        <div class="flex flex-col items-center mb-12">
            <div class="relative group">
                <img id="avatar-preview" src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" class="w-32 h-32 rounded-[2.5rem] object-cover border-4 border-blue-600 shadow-2xl">
                <label for="avatar-input" class="absolute bottom-0 right-0 bg-white text-slate-900 p-3 rounded-xl cursor-pointer shadow-lg hover:bg-blue-600 hover:text-white">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
            </div>
            <h2 class="text-2xl font-900 mt-6" id="display-name">جاري التحميل...</h2>
            <p class="text-slate-400 font-bold" id="user-role-badge">تحميل الرتبة...</p>
        </div>

        <form id="profile-form" class="space-y-8">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">الاسم الكامل</label>
                    <input type="text" id="full-name" placeholder="أدخل اسمك">
                </div>
                <div class="input-group">
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">رقم الهاتف</label>
                    <input type="tel" id="phone-number" placeholder="010xxxxxxx">
                </div>
            </div>

            <div class="input-group">
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase">العنوان بالتفصيل (المنصورة)</label>
                <input type="text" id="user-location" placeholder="مثلاً: حي الجامعة، برج الياسمين">
            </div>

            <div class="pt-8 border-t border-slate-800">
                <h3 class="text-xl font-900 mb-6 flex items-center gap-3">
                    <i class="fas fa-shield-check text-green-500"></i>
                    توثيق الهوية (للفنيين)
                </h3>
                <div class="upload-area" onclick="document.getElementById('id-card').click()">
                    <i class="fas fa-id-card text-4xl text-slate-500 mb-4"></i>
                    <p class="font-bold">ارفع صورة البطاقة الشخصية لتوثيق حسابك</p>
                    <p class="text-xs text-slate-500 mt-2">يساعد التوثيق في ظهور عروضك أولاً للعملاء</p>
                    <input type="file" id="id-card" class="hidden">
                </div>
            </div>

            <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-[1.5rem] font-900 text-xl shadow-xl shadow-blue-900/20 transition-all">حفظ التغييرات</button>
        </form>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkRJZ1YwN8Hqn501hAWwWeBI8_1x3o2Pk",
            authDomain: "khedma-tech-tester.firebaseapp.com",
            projectId: "khedma-tech-tester",
            storageBucket: "khedma-tech-tester.firebasestorage.app",
            messagingSenderId: "51468270453",
            appId: "1:51468270453:web:ec2e1cb0de753eceeab13c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        auth.onAuthStateChanged(async (user) => {
            if(user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('display-name').innerText = data.name || "مستخدم جديد";
                    document.getElementById('user-role-badge').innerText = data.role === 'provider' ? "فني معتمد" : "عميل مميز";
                    document.getElementById('full-name').value = data.name || "";
                    document.getElementById('phone-number').value = data.phone || "";
                    document.getElementById('user-location').value = data.address || "";
                    if(data.avatar) document.getElementById('avatar-preview').src = data.avatar;
                }
            }
        });

        document.getElementById('avatar-input').onchange = async (e) => {
            const file = e.target.files[0];
            const user = auth.currentUser;
            if(!file || !user) return;

            const storageRef = ref(storage, `avatars/${user.uid}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await updateDoc(doc(db, "users", user.uid), { avatar: url });
            document.getElementById('avatar-preview').src = url;
            alert("تم تحديث الصورة الشخصية");
        };

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            try {
                await updateDoc(doc(db, "users", user.uid), {
                    name: document.getElementById('full-name').value,
                    phone: document.getElementById('phone-number').value,
                    address: document.getElementById('user-location').value
                });
                alert("تم حفظ البيانات بنجاح!");
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
</html>
