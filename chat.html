<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة المباشرة | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #0f172a; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 15px 20px; border-radius: 1.5rem; font-weight: bold; position: relative; }
        .msg-sent { background: #2563eb; color: white; align-self: flex-start; border-bottom-right-radius: 0.2rem; }
        .msg-received { background: #1e293b; color: #f8fafc; align-self: flex-end; border-bottom-left-radius: 0.2rem; }
        .chat-input-area { background: #1e293b; padding: 20px; border-top: 1px solid #334155; }
    </style>
</head>
<body>
    <nav class="bg-slate-900 p-5 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-slate-400"><i class="fas fa-chevron-right text-xl"></i></button>
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">ف</div>
            <div>
                <h2 id="chat-with-name" class="text-white font-900 text-sm">جاري التوصيل...</h2>
                <p class="text-[10px] text-green-500 font-bold">متصل الآن</p>
            </div>
        </div>
        <button class="w-10 h-10 bg-slate-800 rounded-xl text-blue-500"><i class="fas fa-phone"></i></button>
    </nav>

    <div id="chat-box" class="chat-container"></div>

    <div class="chat-input-area">
        <div class="max-w-4xl mx-auto flex gap-4">
            <button class="w-12 h-12 bg-slate-800 rounded-2xl text-slate-400"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا..." class="flex-1 bg-slate-900 border-none rounded-2xl px-6 text-white outline-none focus:ring-2 ring-blue-600">
            <button id="send-btn" class="w-14 h-14 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-900/40">
                <i class="fas fa-paper-plane-rtl text-xl"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkRJZ1YwN8Hqn501hAWwWeBI8_1x3o2Pk",
            authDomain: "khedma-tech-tester.firebaseapp.com",
            projectId: "khedma-tech-tester",
            storageBucket: "khedma-tech-tester.firebasestorage.app",
            messagingSenderId: "51468270453",
            appId: "1:51468270453:web:ec2e1cb0de753eceeab13c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id') || "global_chat";

        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        onSnapshot(query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
            chatBox.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const isMe = data.senderId === auth.currentUser?.uid;
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isMe ? 'msg-sent' : 'msg-received'}`;
                msgDiv.innerText = data.text;
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        sendBtn.onclick = async () => {
            if(!msgInput.value.trim() || !auth.currentUser) return;
            const text = msgInput.value;
            msgInput.value = '';
            await addDoc(collection(db, "chats", chatId, "messages"), {
                senderId: auth.currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });
        };

        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendBtn.click(); };
    </script>
</body>
