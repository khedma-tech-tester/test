<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم كفني محترف | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #020617; color: white; }
        .form-step { background: #0f172a; border: 1px solid #1e293b; border-radius: 2.5rem; padding: 2.5rem; }
        .upload-box { border: 2px dashed #1e293b; border-radius: 1.5rem; transition: 0.3s; cursor: pointer; }
        .upload-box:hover { border-color: #2563eb; background: rgba(37, 99, 235, 0.05); }
        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: left 1rem center; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-900 mb-4">كن شريكاً في <span class="text-blue-500">خِدمة تك</span></h1>
            <p class="text-slate-400 font-bold">ابدأ باستقبال طلبات الصيانة في المنصورة وزد دخلك اليوم</p>
        </header>

        <form id="provider-form" class="space-y-8">
            <div class="form-step space-y-8">
                <h3 class="text-xl font-900 border-r-4 border-blue-600 pr-4">البيانات المهنية</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-400 mb-2">التخصص الرئيسي</label>
                        <select id="specialty" class="w-full bg-slate-800 p-4 rounded-xl font-bold outline-none focus:ring-2 ring-blue-600">
                            <option value="plumbing">سباكة وصرف صحي</option>
                            <option value="electricity">كهرباء وإضاءة</option>
                            <option value="ac">تكييف وتبريد</option>
                            <option value="carpentry">نجارة وأثاث</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-400 mb-2">سنوات الخبرة</label>
                        <input type="number" placeholder="مثال: 5" class="w-full bg-slate-800 p-4 rounded-xl font-bold outline-none focus:ring-2 ring-blue-600">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2">منطقة العمل المفضلة</label>
                    <input type="text" placeholder="مثال: حي الجامعة، توريل، المشاية..." class="w-full bg-slate-800 p-4 rounded-xl font-bold outline-none focus:ring-2 ring-blue-600">
                </div>

                <h3 class="text-xl font-900 border-r-4 border-blue-600 pr-4 mt-12">توثيق الهوية (للأمان)</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="upload-box p-8 text-center" onclick="document.getElementById('id-front').click()">
                        <i class="fas fa-id-card text-3xl mb-3 text-slate-500"></i>
                        <p class="text-xs font-bold text-slate-400">وجه البطاقة الشخصية</p>
                        <input type="file" id="id-front" class="hidden">
                    </div>
                    <div class="upload-box p-8 text-center" onclick="document.getElementById('id-back').click()">
                        <i class="fas fa-id-card text-3xl mb-3 text-slate-500"></i>
                        <p class="text-xs font-bold text-slate-400">ظهر البطاقة الشخصية</p>
                        <input type="file" id="id-back" class="hidden">
                    </div>
                </div>

                <div class="flex items-start gap-4 bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20">
                    <i class="fas fa-shield-halved text-blue-500 mt-1"></i>
                    <p class="text-[10px] text-slate-300 leading-relaxed font-bold">
                        نحن نلتزم بخصوصية بياناتك. يتم مراجعة المستندات من قبل الإدارة فقط لتفعيل حسابك وضمان حقوق العملاء.
                    </p>
                </div>

                <button type="submit" class="w-full bg-blue-600 py-5 rounded-[2rem] font-900 text-lg shadow-xl shadow-blue-900/40 hover:bg-blue-500 active:scale-95 transition-transform">
                    تقديم الطلب والمراجعة
                </button>
            </div>
        </form>
    </div>
</body>
</html>
