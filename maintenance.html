<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صيانة دورية | خِدمة تك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #020617; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .cog-icon { font-size: 100px; color: #2563eb; filter: drop-shadow(0 0 30px rgba(37, 99, 235, 0.4)); }
    </style>
</head>
<body class="p-6">

    <div class="space-y-8 max-w-lg">
        <div class="relative flex justify-center">
            <i class="fas fa-cog cog-icon animate-spin"></i>
            <i class="fas fa-wrench absolute -bottom-4 -right-4 text-4xl text-slate-500"></i>
        </div>

        <div>
            <h1 class="text-4xl font-900 mb-4 tracking-tight">نحن نطور <span class="text-blue-500">خِدمة تك</span></h1>
            <p class="text-slate-400 font-bold leading-relaxed">
                نقوم حالياً ببعض التحسينات السحرية لنضمن لك تجربة صيانة أسرع وأفضل في المنصورة. سنعود خلال أقل من ساعة!
            </p>
        </div>

        <div class="p-6 bg-blue-600/10 border border-blue-500/20 rounded-3xl">
            <p class="text-xs font-black text-blue-500 uppercase tracking-widest">موعد العودة التقريبي</p>
            <p class="text-2xl font-900 mt-2">10:30 مساءً</p>
        </div>

        <div class="flex justify-center gap-6 text-slate-500">
            <i class="fab fa-facebook-f hover:text-blue-500 cursor-pointer"></i>
            <i class="fab fa-instagram hover:text-pink-500 cursor-pointer"></i>
            <i class="fab fa-whatsapp hover:text-green-500 cursor-pointer"></i>
        </div>
    </div>

</body>
</html>
